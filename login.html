<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Expense Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);  opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    .auth-box {
      background: linear-gradient(var(--bg), var(--bg)) padding-box,
                  linear-gradient(135deg, rgba(124,110,240,0.5), rgba(192,132,252,0.15), rgba(52,211,153,0.3), rgba(124,110,240,0.5)) border-box;
      border: 1.5px solid transparent;
    }

    .auth-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(192,132,252,0.1);
      border: 1px solid rgba(192,132,252,0.2);
      border-radius: 99px;
      padding: 4px 12px;
      margin-bottom: 16px;
    }

    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: #fca5a5;
      font-size: 12px;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 14px;
      display: none;
    }

    .auth-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .auth-stat { text-align: center; }
    .auth-stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }
    .auth-stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .input-wrap {
      margin-bottom: 12px;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      -webkit-appearance: none;
    }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,110,240,0.15);
    }
    .input-wrap input::placeholder { color: var(--muted); }
  </style>
</head>
<body class="auth-page">

<div class="auth-box">
  <div class="auth-tag">💎 Expense Tracker</div>
  <h1>Welcome<br>back.</h1>
  <p class="auth-sub">Sign in to manage your finances.</p>

  <div class="error-msg" id="errorMsg">Invalid username or password.</div>

  <form method="POST">
    <div class="input-wrap">
      <input type="text" name="username" placeholder="Username" required autocomplete="username">
    </div>
    <div class="input-wrap">
      <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-primary">Sign In →</button>
  </form>

  <div class="auth-divider">or</div>

  <a href="/signup" style="text-decoration:none;">
    <button class="btn-ghost">Create an Account</button>
  </a>

  <div class="auth-stats">
    <div class="auth-stat">
      <div class="auth-stat-val">5+</div>
      <div class="auth-stat-label">Categories</div>
    </div>
    <div class="auth-stat">
      <div class="auth-stat-val">∞</div>
      <div class="auth-stat-label">Expenses</div>
    </div>
    <div class="auth-stat">
      <div class="auth-stat-val">₹</div>
      <div class="auth-stat-label">Budgets</div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('.btn-primary').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(r);
      setTimeout(() => r.remove(), 600);
    });
  });

  const colors = ['rgba(124,110,240,0.7)', 'rgba(192,132,252,0.6)', 'rgba(52,211,153,0.5)', 'rgba(251,191,36,0.4)'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;bottom:${Math.random()*-20}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*10}s;filter:blur(${Math.random()}px);`;
    document.body.appendChild(p);
  }
</script>
</body>
</html>
