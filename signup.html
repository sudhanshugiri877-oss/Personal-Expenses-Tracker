<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Expense Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);  opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    .auth-box {
      background: linear-gradient(var(--bg), var(--bg)) padding-box,
                  linear-gradient(135deg, rgba(52,211,153,0.4), rgba(124,110,240,0.2), rgba(192,132,252,0.4)) border-box;
      border: 1.5px solid transparent;
    }

    .auth-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--green);
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 99px;
      padding: 4px 12px;
      margin-bottom: 16px;
    }

    .btn-primary-green {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #059669 0%, var(--green) 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      margin-bottom: 10px;
      box-shadow: 0 4px 20px rgba(52,211,153,0.3);
    }
    .btn-primary-green:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(52,211,153,0.45); }
    .btn-primary-green:active { transform: scale(0.98); }
    .btn-primary-green .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleAnim 0.55s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: -6px;
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .input-wrap {
      margin-bottom: 12px;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      -webkit-appearance: none;
    }
    .input-wrap input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(52,211,153,0.12);
    }
    .input-wrap input::placeholder { color: var(--muted); }
  </style>
</head>
<body class="auth-page">

<div class="auth-box">
  <div class="auth-tag">✨ New Account</div>
  <h1>Start tracking<br>smarter.</h1>
  <p class="auth-sub">Create your free account in seconds.</p>

  <form method="POST">
    <div class="input-wrap">
      <input type="text" name="username" placeholder="Choose a username" required autocomplete="username">
    </div>
    <div class="input-wrap">
      <input type="password" name="password" placeholder="Create a password" required autocomplete="new-password">
    </div>
    <p class="hint">Use a strong password you'll remember.</p>
    <button type="submit" class="btn-primary-green">Create Account →</button>
  </form>

  <div class="auth-divider">already have an account?</div>

  <a href="/login" style="text-decoration:none;">
    <button class="btn-ghost">Sign In Instead</button>
  </a>
</div>

<script>
  document.querySelectorAll('.btn-primary-green').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(r);
      setTimeout(() => r.remove(), 600);
    });
  });

  const colors = ['rgba(52,211,153,0.6)', 'rgba(124,110,240,0.6)', 'rgba(192,132,252,0.5)'];
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;bottom:${Math.random()*-20}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*10}s;`;
    document.body.appendChild(p);
  }
</script>
</body>
</html>
